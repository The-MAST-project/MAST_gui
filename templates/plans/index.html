{% extends "base.html" %}
{% load static %}
{% load dynamic_urls %}

{% block content %}
<div x-data="plansPage()" x-init="init()" class="container py-3">
	<h1>Plans</h1>

	<!-- In-progress block -->
	<div id="plans-in-progress" class="mb-3">
		<h5>In Progress</h5>
		<template x-if="inProgress.length === 0">
			<p class="text-muted ms-4">No plans are in progress.</p>
		</template>
		<ul class="list-unstyled" x-show="inProgress.length > 0">
			<template x-for="p in inProgress" :key="p.ulid">
				<li>
					<a href="#" class="plan-link" 
					   x-text="p.ulid"
					   :data-plan-ulid="p.ulid"
					   :data-plan-tab="p._tab || getTabForPlan(p)"
					   @click.prevent="selectPlan(p.ulid, p._tab || getTabForPlan(p))">
					</a>
				</li>
			</template>
		</ul>
	</div>

	<!-- Tabs -->
	<ul class="nav nav-tabs" id="plansTabs" role="tablist">
		<li class="nav-item" role="presentation">
			<button class="nav-link active" id="tab-pending" data-bs-toggle="tab" data-bs-target="#pane-pending" type="button" role="tab">
				Pending <small>(<span x-text="pending.length"></span>)</small>
			</button>
		</li>
		<li class="nav-item" role="presentation">
			<button class="nav-link" id="tab-completed" data-bs-toggle="tab" data-bs-target="#pane-completed" type="button" role="tab">
				Completed <small>(<span x-text="completed.length"></span>)</small>
			</button>
		</li>
		<li class="nav-item" role="presentation">
			<button class="nav-link" id="tab-postponed" data-bs-toggle="tab" data-bs-target="#pane-postponed" type="button" role="tab">
				Postponed <small>(<span x-text="postponed.length"></span>)</small>
			</button>
		</li>
		<li class="nav-item" role="presentation">
			<button class="nav-link" id="tab-expired" data-bs-toggle="tab" data-bs-target="#pane-expired" type="button" role="tab">
				Expired <small>(<span x-text="expired.length"></span>)</small>
			</button>
		</li>
		<li class="nav-item" role="presentation">
			<button class="nav-link" id="tab-failed" data-bs-toggle="tab" data-bs-target="#pane-failed" type="button" role="tab">
				Failed <small>(<span x-text="failed.length"></span>)</small>
			</button>
		</li>
	</ul>

	<div class="tab-content mt-3">
		<!-- Pending -->
		<div class="tab-pane fade show active" id="pane-pending" role="tabpanel">
			<!-- Fixed Column Headers -->
			<div class="d-flex align-items-center fw-bold mb-2 px-3 py-2" style="background-color: #f8f9fa; position: sticky; top: 0; z-index: 10;">
				<span style="min-width: 30px; margin-right: 0.75rem;">#</span>
				<span style="width: 20px; margin-right: 0.5rem;">ID</span>
				<span style="flex-grow: 1;">Owner</span>
			</div>
			
			<div class="accordion" id="accordion-pending">
				<template x-for="(p, index) in pending" :key="p.ulid">
					<div class="accordion-item" :data-plan-ulid="p.ulid" :data-plan-tab="'pending'">
						<h2 class="accordion-header d-flex align-items-center justify-content-between">
							<!-- Accordion toggle (left) -->
							<button class="accordion-button collapsed flex-grow-1 text-start me-2"
									type="button"
									data-bs-toggle="collapse"
									:data-bs-target="'#pending-'+p.ulid">
								<span class="text-muted me-3" style="min-width: 30px;" x-text="(index + 1) + '.'"></span>
								<i class="bi bi-person-badge me-2" 
								   data-bs-toggle="tooltip" 
								   data-bs-placement="top" 
								   :title="p.ulid"></i>
								<span x-text="p.owner || 'n/a'"></span>
							</button>
							<!-- Action buttons (right, not part of toggle) -->
							<div class="btn-group">
								<button class="btn btn-sm btn-warning" type="button" @click.stop="postponePlan(p.ulid)" :disabled="!canManagePlans">Postpone</button>
								<button class="btn btn-sm btn-danger" type="button" @click.stop="deletePlan(p.ulid)" :disabled="!canManagePlans">Delete</button>
								<span style="margin-right: 0.5rem;"></span>
							</div>
						</h2>
						<div :id="'pending-'+p.ulid" class="accordion-collapse collapse">
							<div class="accordion-body">
								<!-- Collapsible JSON tree widget -->
								<div class="json-tree" style="max-height:300px; overflow:auto; font-family: monospace; font-size:0.9rem; padding:0.25rem;"
									 x-init="renderJsonTree($el, p)"></div>
							</div>
						</div>
					</div>
				</template>
				<template x-if="pending.length === 0">
					<div class="text-muted p-3">No pending plans.</div>
				</template>
			</div>
		</div>

<!-- Ensure ControlApi (api.js) is loaded BEFORE the plans client script -->
<script src="{% get_dynamic_static_url 'js/api.js' %}"></script>
<script src="{% get_dynamic_static_url 'js/plans.js' %}"></script>
<script src="{% get_dynamic_static_url 'js/renderJsonTree.js' %}"></script>

<script>
	// pass server-side capability flag into Alpine    
    window.__PLANS_INIT = {
        canManagePlans: {% if canManagePlans %}true{% else %}false{% endif %}
    };
	
	// Initialize Bootstrap tooltips after Alpine renders
	document.addEventListener('alpine:initialized', () => {
		setTimeout(() => {
			var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
			tooltipTriggerList.forEach(function (tooltipTriggerEl) {
				new bootstrap.Tooltip(tooltipTriggerEl);
			});
		}, 100);
	});
</script>
