{% load static %}
{% load dynamic_urls %}

<style>
/* Sidebar container styles */
.sidebar {
    width: 300px;
    min-width: 70px;
    max-width: 100vw;
    min-height: calc(100vh - 80px);
    background: #f8f9fa;
    border-right: 1px solid #dee2e6;
    transition: width 0.3s ease;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    z-index: 1;
}
.sidebar-collapsed {
    width: 70px !important;
}
.sidebar-collapsed .sidebar-item-text,
.sidebar-collapsed .sidebar-item-arrow,
.sidebar-collapsed .sidebar-submenu {
    display: none !important;
}
.sidebar-collapsed .sidebar-item,
.sidebar-collapsed .sidebar-subitem {
    justify-content: center;
    padding: 0.5rem;
}
.sidebar-header {
    padding: 0.5rem 1rem;
    border-bottom: 1px solid #dee2e6;
    background: #fff;
    display: flex;
    align-items: center;
}
.sidebar-toggle {
    background: none;
    border: none;
    font-size: 1.5rem;
    color: #495057;
}
.sidebar-menu {
    flex: 1 1 auto;
    padding: 1rem 0.5rem;
}
.sidebar-separator {
    height: 1px;
    background: #dee2e6;
    margin: 1rem 0;
}
.sidebar-item, .sidebar-subitem {
    display: flex;
    align-items: center;
    padding: 0.5rem 1rem;
    color: #333;
    text-decoration: none;
    border-radius: 0.375rem;
    margin-bottom: 0.25rem;
    transition: background 0.2s;
    gap: 0.5rem;
}
.sidebar-item.active, .sidebar-item:hover, .sidebar-subitem.active, .sidebar-subitem:hover {
    background: #e9ecef;
    color: #212529;
}
.sidebar-item-arrow {
    margin-left: auto;
}
.sidebar-submenu {
    padding-left: 1.5rem;
    margin-bottom: 0.5rem;
}
.sidebar-item[data-bs-toggle="collapse"] {
    cursor: pointer;
}
/* Remove all badge color definitions - they now come from colors.css */
</style>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header d-flex align-items-center justify-content-between">
        <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()" title="Collapse sidebar">
            <i class="bi bi-chevron-left" id="toggleIcon"></i>
        </button>
    </div>
    
    <div class="sidebar-menu">
        <!-- Sites -->
        <a href="{% get_dynamic_url 'units:site_dashboard' %}" class="sidebar-item {% if request.resolver_match.app_name == 'units' %}active{% endif %}">
            <i class="bi bi-building"></i>
            <span class="sidebar-item-text">Sites</span>
        </a>
        
        <!-- Spectrograph -->
        <a href="{% get_dynamic_url 'specs:model' %}" class="sidebar-item {% if request.resolver_match.app_name == 'specs' %}active{% endif %}">
            <i class="bi bi-box"></i>
            <span class="sidebar-item-text">Spectrograph</span>
        </a>
        
        <!-- Safety (with submenu) -->
        <div class="sidebar-item" data-bs-toggle="collapse" data-bs-target="#safety-submenu" aria-expanded="false">
            <i class="bi bi-shield-check"></i>
            <span class="sidebar-item-text">Safety</span>
            <i class="bi bi-chevron-right sidebar-item-arrow"></i>
        </div>
        <div class="collapse sidebar-submenu" id="safety-submenu">
            <a href="{% get_dynamic_url 'safety:graphs' %}" class="sidebar-subitem {% if request.resolver_match.url_name == 'graphs' %}active{% endif %}">
                Graphs
            </a>
            <a href="{% get_dynamic_url 'safety:data' %}" class="sidebar-subitem {% if request.resolver_match.url_name == 'data' %}active{% endif %}">
                Data
            </a>
        </div>
        
        <!-- Assignments -->
        <a href="{% get_dynamic_url 'assignments:list' %}" class="sidebar-item {% if request.resolver_match.app_name == 'assignments' %}active{% endif %}">
            <i class="bi bi-clipboard-check"></i>
            <span class="sidebar-item-text">Assignments</span>
        </a>
        
        <!-- Plans -->
        <a id="sidebar-link-plans" href="{% get_dynamic_url 'plans_index' %}" class="sidebar-item {% if request.resolver_match.url_name == 'plans_index' %}active{% endif %}">
            <i class="bi bi-calendar-event"></i>
            <span class="sidebar-item-text">Plans</span>
        </a>

        <!-- Monitoring (Grafana) -->
        <div class="sidebar-item" data-bs-toggle="collapse" data-bs-target="#monitoring-submenu" aria-expanded="false">
            <i class="bi bi-bar-chart-line"></i>
            <span class="sidebar-item-text">Monitoring</span>
            <i class="bi bi-chevron-right sidebar-item-arrow"></i>
        </div>
        <div class="collapse sidebar-submenu" id="monitoring-submenu">
            <a href="{% get_dynamic_url 'grafana_linux' %}" class="sidebar-subitem {% if request.resolver_match.url_name == 'grafana_linux' %}active{% endif %}">
                Linux machines
            </a>
            <a href="{% get_dynamic_url 'grafana_windows' %}" class="sidebar-subitem {% if request.resolver_match.url_name == 'grafana_windows' %}active{% endif %}">
                Windows machines
            </a>
        </div>
        
        {% if perms.accounts.can_manage_users %}
        <div class="sidebar-separator"></div>
        <!-- Manage submenu -->
        <div class="sidebar-item" data-bs-toggle="collapse" data-bs-target="#manage-submenu" aria-expanded="false">
            <i class="bi bi-gear"></i>
            <span class="sidebar-item-text">Manage</span>
            <i class="bi bi-chevron-right sidebar-item-arrow"></i>
        </div>
        <div class="collapse sidebar-submenu" id="manage-submenu">
            <a href="{% url 'admin_users' %}" class="sidebar-subitem {% if request.resolver_match.url_name == 'admin_users' %}active{% endif %}">
                Users
            </a>
            <a href="{% url 'admin_groups' %}" class="sidebar-subitem {% if request.resolver_match.url_name == 'admin_groups' %}active{% endif %}">
                Groups
            </a>
            <a href="{% url 'manage_ownerships' %}" class="sidebar-subitem {% if request.resolver_match.url_name == 'manage_ownerships' %}active{% endif %}">
                Ownerships
            </a>
        </div>
        {% endif %}
    </div>
</div>

<script>
// Arrow rotation: sync with Bootstrap collapse events
document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.sidebar-submenu').forEach(function(submenu) {
        var trigger = document.querySelector('[data-bs-target="#' + submenu.id + '"]');

        // Auto-open if contains active item
        if (submenu.querySelector('.sidebar-subitem.active')) {
            new bootstrap.Collapse(submenu, {toggle: false}).show();
        }

        submenu.addEventListener('show.bs.collapse', function() {
            if (trigger) {
                var arrow = trigger.querySelector('.sidebar-item-arrow');
                if (arrow) {
                    arrow.classList.replace('bi-chevron-right', 'bi-chevron-down');
                }
                trigger.setAttribute('aria-expanded', 'true');
            }
        });
        submenu.addEventListener('hide.bs.collapse', function() {
            if (trigger) {
                var arrow = trigger.querySelector('.sidebar-item-arrow');
                if (arrow) {
                    arrow.classList.replace('bi-chevron-down', 'bi-chevron-right');
                }
                trigger.setAttribute('aria-expanded', 'false');
            }
        });
    });
});

function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const toggleIcon = document.getElementById('toggleIcon');
    const isCollapsed = sidebar.classList.toggle('sidebar-collapsed');

    if (isCollapsed) {
        toggleIcon.classList.remove('bi-chevron-left');
        toggleIcon.classList.add('bi-chevron-right');
    } else {
        toggleIcon.classList.remove('bi-chevron-right');
        toggleIcon.classList.add('bi-chevron-left');
    }
}
</script>
