{% load static %}
{% load dynamic_urls %}

<style>
/* Sidebar container styles */
.sidebar {
    width: 300px;
    min-width: 70px;
    max-width: 100vw;
    min-height: calc(100vh - 80px);
    background: #f8f9fa;
    border-right: 1px solid #dee2e6;
    transition: width 0.3s ease;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    z-index: 1;
}
.sidebar-collapsed {
    width: 70px !important;
}
.sidebar-collapsed .sidebar-item-text,
.sidebar-collapsed .sidebar-item-arrow,
.sidebar-collapsed .sidebar-submenu {
    display: none !important;
}
.sidebar-collapsed .sidebar-user-menu .btn {
    padding: 0.5rem;
    width: 100%;
}
.sidebar-collapsed .sidebar-user-menu .btn span {
    display: none;
}
.sidebar-collapsed .sidebar-user-menu .btn .bi-caret-down-fill {
    display: none;
}
.sidebar-collapsed .sidebar-item,
.sidebar-collapsed .sidebar-subitem {
    justify-content: center;
    padding: 0.5rem;
}
.sidebar-header {
    padding: 0.5rem 1rem;
    border-bottom: 1px solid #dee2e6;
    background: #fff;
    display: flex;
    align-items: center;
}
.sidebar-toggle {
    background: none;
    border: none;
    font-size: 1.5rem;
    color: #495057;
}
.sidebar-menu {
    flex: 1 1 auto;
    padding: 1rem 0.5rem;
}
.sidebar-separator {
    height: 1px;
    background: #dee2e6;
    margin: 1rem 0;
}
.sidebar-item, .sidebar-subitem {
    display: flex;
    align-items: center;
    padding: 0.5rem 1rem;
    color: #333;
    text-decoration: none;
    border-radius: 0.375rem;
    margin-bottom: 0.25rem;
    transition: background 0.2s;
    gap: 0.5rem;
}
.sidebar-item.active, .sidebar-item:hover, .sidebar-subitem.active, .sidebar-subitem:hover {
    background: #e9ecef;
    color: #212529;
}
.sidebar-item-arrow {
    margin-left: auto;
}
.sidebar-submenu {
    padding-left: 1.5rem;
    margin-bottom: 0.5rem;
}
.sidebar-user-menu {
    padding: 1rem;
    border-top: 1px solid #dee2e6;
    background: #fff;
}
/* Subdued badge backgrounds for all pages */
.badge {
    background-color: #e9ecef !important;
    color: #333 !important;
    border-radius: 0.375rem !important;
    font-weight: 500;
}
.badge.bg-success {
    background-color: #d1e7dd !important;
    color: #0f5132 !important;
}
.badge.bg-secondary {
    background-color: #e2e3e5 !important;
    color: #41464b !important;
}
.badge.bg-info {
    background-color: #cff4fc !important;
    color: #055160 !important;
}
.badge.bg-warning {
    background-color: #fff3cd !important;
    color: #664d03 !important;
}
.badge.bg-danger {
    background-color: #f8d7da !important;
    color: #842029 !important;
}
.badge.bg-primary {
    background-color: #cfe2ff !important;
    color: #084298 !important;
}
</style>
<div class="sidebar" id="sidebar">
    <div class="sidebar-header d-flex align-items-center justify-content-between">
        <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()" title="Collapse sidebar">
            <i class="bi bi-chevron-left" id="toggleIcon"></i>
        </button>
    </div>
    
    <div class="sidebar-menu">
        <!-- Sites -->
        <a href="{% get_dynamic_url 'units:site_dashboard' %}" class="sidebar-item {% if request.resolver_match.app_name == 'units' %}active{% endif %}">
            <i class="bi bi-building"></i>
            <span class="sidebar-item-text">Sites</span>
        </a>
        
        <!-- Specs -->
        <a href="{% get_dynamic_url 'specs:list' %}" class="sidebar-item {% if request.resolver_match.app_name == 'specs' %}active{% endif %}">
            <i class="bi bi-box"></i>
            <span class="sidebar-item-text">Specs</span>
        </a>
        
        <!-- Safety (with submenu) -->
        <div class="sidebar-item" data-submenu="safety-submenu">
            <i class="bi bi-shield-check"></i>
            <span class="sidebar-item-text">Safety</span>
            <i class="bi bi-chevron-right sidebar-item-arrow"></i>
        </div>
        <div class="sidebar-submenu" id="safety-submenu">
            <a href="{% get_dynamic_url 'safety:graphs' %}" class="sidebar-subitem {% if request.resolver_match.url_name == 'graphs' %}active{% endif %}">
                Graphs
            </a>
            <a href="{% get_dynamic_url 'safety:data' %}" class="sidebar-subitem {% if request.resolver_match.url_name == 'data' %}active{% endif %}">
                Data
            </a>
        </div>
        
        <!-- Assignments -->
        <a href="{% get_dynamic_url 'assignments:list' %}" class="sidebar-item {% if request.resolver_match.app_name == 'assignments' %}active{% endif %}">
            <i class="bi bi-clipboard-check"></i>
            <span class="sidebar-item-text">Assignments</span>
        </a>
        
        <!-- Plans -->
        <a id="sidebar-link-plans" href="{% get_dynamic_url 'plans_index' %}" class="sidebar-item {% if request.resolver_match.url_name == 'plans_index' %}active{% endif %}">
            <i class="bi bi-calendar-event"></i>
            <span class="sidebar-item-text">Plans</span>
        </a>
        
        <!-- Separator -->
        
        <!-- User menu -->
        <div class="sidebar-user-menu mt-4">
            <div class="dropdown">
                <button class="btn btn-light dropdown-toggle" type="button" id="userMenuDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="bi bi-person-circle"></i>
                    {% if request.user.is_authenticated %}
                        {{ request.user.username }}
                    {% else %}
                        Guest
                    {% endif %}
                </button>
                <ul class="dropdown-menu" aria-labelledby="userMenuDropdown">
                    {% if request.user.is_authenticated %}
                        <li>
                            <form id="logout-form" method="post" action="{% get_dynamic_url 'logout' %}" style="display:inline;">
                                {% csrf_token %}
                                <button type="submit" class="dropdown-item">Logout</button>
                            </form>
                        </li>
                    {% else %}
                        <li>
                            <a class="dropdown-item" href="{% get_dynamic_url 'login' %}">Login</a>
                        </li>
                    {% endif %}
                    <li>
                        <a class="dropdown-item" href="{% get_dynamic_url 'signup' %}">Signup</a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</div>

<script>
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const toggleIcon = document.getElementById('toggleIcon');
    const isCollapsed = sidebar.classList.toggle('sidebar-collapsed');
    
    if (isCollapsed) {
        toggleIcon.classList.remove('bi-chevron-left');
        toggleIcon.classList.add('bi-chevron-right');
    } else {
        toggleIcon.classList.remove('bi-chevron-right');
        toggleIcon.classList.add('bi-chevron-left');
    }
}
</script>
