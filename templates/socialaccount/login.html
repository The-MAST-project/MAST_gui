{% extends "base.html" %}
{% load dynamic_urls %}

{% block content %}
<div class="container mt-5" style="max-width: 400px;">
    <div class="card shadow-sm">
        <div class="card-body text-center p-4">
            <h5 class="card-title mb-3">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign in via {{ provider.name }}
            </h5>
            <p class="text-muted mb-4">
                You are about to sign in using a third-party account from <strong>{{ provider.name }}</strong>.
            </p>
            <form method="post" action="{{ request.path }}">
                {% csrf_token %}
                <input type="hidden" name="process" value="{{ process }}" />
                <input type="hidden" name="scope" value="{{ scope }}" />
                <input type="hidden" name="auth_params" value="{{ auth_params }}" />
                <button type="submit" class="btn btn-primary w-100">Continue</button>
            </form>
            <div class="mt-3">
                <a href="{% get_dynamic_url 'login' %}" class="text-muted small">Cancel</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
