<div class="modal fade show d-block" tabindex="-1" style="background: rgba(0,0,0,0.5);">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit User: {{ edit_user.username }}</h5>
                <button type="button" class="btn-close" onclick="document.getElementById('modal-container').innerHTML=''"></button>
            </div>
            <form hx-post="{% url 'admin_user_edit' edit_user.id %}"
                  hx-target="#user-{{ edit_user.id }}"
                  hx-swap="outerHTML">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" value="{{ edit_user.username }}" disabled>
                        <small class="text-muted">Username cannot be changed</small>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" value="{{ edit_user.email }}">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-control" name="first_name" value="{{ edit_user.first_name }}">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Groups</label>
                        {% for group in groups %}
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" 
                                       name="groups" value="{{ group.id }}"
                                       id="group-{{ group.id }}"
                                       {% if group in edit_user.groups.all %}checked{% endif %}>
                                <label class="form-check-label" for="group-{{ group.id }}">
                                    {{ group.name }}
                                </label>
                            </div>
                        {% endfor %}
                    </div>
                    
                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="is_active" id="is_active"
                                   {% if edit_user.is_active %}checked{% endif %}>
                            <label class="form-check-label" for="is_active">Active</label>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="is_staff" id="is_staff"
                                   {% if edit_user.is_staff %}checked{% endif %}>
                            <label class="form-check-label" for="is_staff">Staff Status</label>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" 
                            onclick="document.getElementById('modal-container').innerHTML=''">
                        Cancel
                    </button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // Close modal on successful form submission
    document.body.addEventListener('htmx:afterSwap', function(event) {
        if (event.detail.target.id.startsWith('user-')) {
            document.getElementById('modal-container').innerHTML = '';
        }
    });
</script>
