<div class="modal fade show" id="profileModal" tabindex="-1" style="display:block;" aria-modal="true" role="dialog">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <form method="post" hx-post="{% url 'admin_user_edit' edit_user.id %}" hx-target="#profile-modal-container" hx-swap="innerHTML">
        {% csrf_token %}
        <div class="modal-header">
          <h5 class="modal-title">Edit User Profile</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"
                  onclick="document.getElementById('profile-modal-container').innerHTML = ''"></button>
        </div>
        <div class="modal-body">
          {% for field in form %}
            <div class="mb-3">
              <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
              {{ field }}
              {% if field.help_text %}
                <div class="form-text mt-1">{{ field.help_text }}</div>
              {% endif %}
              {% for error in field.errors %}
                <div class="text-danger small mt-1">{{ error }}</div>
              {% endfor %}
            </div>
          {% endfor %}
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-outline-secondary">Save</button>
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal"
                  onclick="document.getElementById('profile-modal-container').innerHTML = ''">Cancel</button>
        </div>
      </form>
    </div>
  </div>
</div>
