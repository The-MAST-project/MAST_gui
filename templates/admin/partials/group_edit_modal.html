<div class="modal fade show" id="groupEditModal" tabindex="-1" style="display:block;" aria-modal="true" role="dialog">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <form method="post"
            hx-post="{% url 'admin_group_edit' edit_group.id %}"
            hx-target="#group-row-{{ edit_group.id }}"
            hx-swap="outerHTML"
            hx-on::after-request="document.getElementById('group-modal-container').innerHTML = ''">
        {% csrf_token %}
        <div class="modal-header">
          <h5 class="modal-title">Edit Group — {{ edit_group.name }}</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"
                  onclick="document.getElementById('group-modal-container').innerHTML = ''"></button>
        </div>
        <div class="modal-body">

          {# Group name #}
          <div class="row mb-3 align-items-center">
            <label class="col-3 col-form-label fw-bold">Name</label>
            <div class="col-9">
              <input type="text" name="name" class="form-control" value="{{ edit_group.name }}" required>
            </div>
          </div>

          {# Capabilities #}
          <div class="row mb-2 align-items-start">
            <span class="col-3 col-form-label fw-bold">Capabilities</span>
            <div class="col-9 pt-2">
              {% for perm in mast_permissions %}
              {% if perm.codename != 'can_view' %}
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="permissions"
                       value="{{ perm.id }}" id="perm-{{ perm.id }}"
                       {% if perm in edit_group.permissions.all %}checked{% endif %}>
                <label class="form-check-label" for="perm-{{ perm.id }}">{{ perm.name }}</label>
              </div>
              {% endif %}
              {% endfor %}
            </div>
          </div>

          {# Members #}
          <div class="row mb-2 align-items-start">
            <span class="col-3 col-form-label fw-bold">Members</span>
            <div class="col-9 pt-2">
              {% for member in members %}
                <span class="badge bg-info me-1 mb-1">{{ member.username }}</span>
              {% empty %}
                <span class="text-muted fst-italic">None</span>
              {% endfor %}
            </div>
          </div>

        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal"
                  onclick="document.getElementById('group-modal-container').innerHTML = ''">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>
<script>
    new bootstrap.Modal(document.getElementById('groupEditModal')).show();
</script>
