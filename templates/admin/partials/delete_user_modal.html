<div class="modal fade" id="deleteUserModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Delete User</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>You are about to permanently delete <strong>{{ user.username }}</strong>.</p>
                <p class="text-muted">
                    Ownership of all plans and other entities belonging to this user
                    will be transferred to <strong>mast</strong>.
                    This action cannot be undone.
                </p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger"
                        hx-post="{% url 'admin_delete_user' user.id %}"
                        hx-target="#user-row-{{ user.id }}"
                        hx-swap="outerHTML"
                        hx-on::after-request="bootstrap.Modal.getInstance(document.getElementById('deleteUserModal')).hide()">
                    Delete
                </button>
            </div>
        </div>
    </div>
</div>
<script>
    const deleteModal = new bootstrap.Modal(document.getElementById('deleteUserModal'));
    deleteModal.show();
</script>
