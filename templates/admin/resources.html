{% extends 'base.html' %}
{% csrf_token %}

{% block title %}System Resources - MAST GUI{% endblock %}

{% block content %}
<div class="container-fluid">
    <h1>System Resources</h1>
    <div class="card mb-3">
        <div class="card-header">
            <strong>Netdata Monitoring</strong>
        </div>
        <div class="card-body">
            <iframe src="{{ proxy_url }}" width="100%" height="800" frameborder="0" style="border:1px solid #ccc; border-radius: 4px; background: #fff;">
                Your browser does not support iframes.
            </iframe>
            <div class="mt-2">
                <small>
                    Monitoring host: <code>{{ netdata_host }}</code>
                    &mdash;
                    <a href="{{ netdata_url }}" target="_blank" rel="noopener">Open Netdata in new tab</a>
                </small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
