{% extends "admin/base.html" %}
{% load static %}

{% block extrahead %}
<style>
/* Subdued badge backgrounds */
.badge, .badge.bg-success, .badge.bg-secondary, .badge.bg-info, .badge.bg-warning, .badge.bg-danger, .badge.bg-primary {
    background-color: #e9ecef !important;
    color: #333 !important;
    border-radius: 0.375rem !important;
    font-weight: 500;
}
.badge.bg-success { background-color: #d1e7dd !important; color: #0f5132 !important; }
.badge.bg-secondary { background-color: #e2e3e5 !important; color: #41464b !important; }
.badge.bg-info { background-color: #cff4fc !important; color: #055160 !important; }
.badge.bg-warning { background-color: #fff3cd !important; color: #664d03 !important; }
.badge.bg-danger { background-color: #f8d7da !important; color: #842029 !important; }
.badge.bg-primary { background-color: #cfe2ff !important; color: #084298 !important; }

/* Subdued buttons */
.btn, .button, input[type="submit"], input[type="button"], button {
    background-color: #f8f9fa !important;
    color: #333 !important;
    border: 1px solid #ced4da !important;
    border-radius: 0.375rem !important;
    font-weight: 500;
    box-shadow: none !important;
}
.btn-primary, .button-primary {
    background-color: #d1e7dd !important;
    color: #0f5132 !important;
    border-color: #bcd0c7 !important;
}
.btn-danger, .button-danger {
    background-color: #f8d7da !important;
    color: #842029 !important;
    border-color: #f5c2c7 !important;
}
.btn-warning, .button-warning {
    background-color: #fff3cd !important;
    color: #664d03 !important;
    border-color: #ffe69c !important;
}
.btn-info, .button-info {
    background-color: #cff4fc !important;
    color: #055160 !important;
    border-color: #b6effb !important;
}
.btn-secondary, .button-secondary {
    background-color: #e2e3e5 !important;
    color: #41464b !important;
    border-color: #d3d6d8 !important;
}
.btn-success, .button-success {
    background-color: #d1e7dd !important;
    color: #0f5132 !important;
    border-color: #bcd0c7 !important;
}
.btn:active, .btn:focus, .btn:hover,
.button:active, .button:focus, .button:hover {
    filter: brightness(0.97);
    box-shadow: none !important;
}
</style>
{% endblock %}
