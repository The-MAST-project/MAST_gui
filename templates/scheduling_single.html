{% extends 'base.html' %}

{% block title %}Scheduling — Single Site{% endblock %}

{% block content %}
<div class="container-fluid py-3">
  <div class="d-flex align-items-center gap-3 mb-4">
    <h2 class="mb-0">Single site scheduling</h2>
    <form method="get" class="mb-0">
      <select id="siteSelect" name="site" class="form-select form-select-sm w-auto" onchange="this.form.submit()">
        {% for s in all_sites %}
        <option value="{{ s.name }}" {% if s.name == scheduling_site %}selected{% endif %}>
          {{ s.location.name|default:s.name }}
        </option>
        {% endfor %}
      </select>
    </form>
  </div>

  {% if error %}
  <div class="alert alert-danger">
    <i class="bi bi-exclamation-triangle me-2"></i>{{ error }}
  </div>
  {% else %}

  <table class="table table-sm table-borderless align-middle mb-0" style="max-width: 700px;">
    <tbody id="scheduling-resources"
           hx-get="{% url 'scheduling_single_resources' %}?site={{ scheduling_site }}"
           hx-trigger="every 15s"
           hx-swap="innerHTML">
      {% include "scheduling/_resources.html" %}
    </tbody>
  </table>

  {% endif %}
</div>
{% endblock %}
