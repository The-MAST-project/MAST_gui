{% extends "base.html" %}

{% block title %}Sign Up - MAST GUI{% endblock %}

{% block content %}
<div class="container mt-5" style="max-width: 400px;">
    <h3 class="mb-4 text-center">Sign Up</h3>
    <div class="mb-4 text-center">
        <div class="mb-2">Sign up with:</div>
        <a href="{% url 'social:begin' 'google-oauth2' %}" class="btn btn-outline-danger w-100 mb-2">
            <i class="bi bi-google"></i> Google
        </a>
        <a href="{% url 'social:begin' 'github' %}" class="btn btn-outline-dark w-100 mb-2">
            <i class="bi bi-github"></i> GitHub
        </a>
        <!-- Add more providers as needed -->
    </div>
    <div class="text-center mb-3 text-muted">or</div>
    <div class="d-grid">
        <a href="{% url 'local_signup' %}" class="btn btn-outline-primary">Create a local account</a>
    </div>
    <div class="mt-3 text-center">
        <a href="{% url 'login' %}">Already have an account? Login</a>
    </div>
</div>
{% endblock %}
