{% load static %}
<style>
/* Subdued badge backgrounds for all pages */
.badge {
    background-color: #e9ecef !important;
    color: #333 !important;
    border-radius: 0.375rem !important;
    font-weight: 500;
}
.badge.bg-success {
    background-color: #d1e7dd !important;
    color: #0f5132 !important;
}
.badge.bg-secondary {
    background-color: #e2e3e5 !important;
    color: #41464b !important;
}
.badge.bg-info {
    background-color: #cff4fc !important;
    color: #055160 !important;
}
.badge.bg-warning {
    background-color: #fff3cd !important;
    color: #664d03 !important;
}
.badge.bg-danger {
    background-color: #f8d7da !important;
    color: #842029 !important;
}
.badge.bg-primary {
    background-color: #cfe2ff !important;
    color: #084298 !important;
}
</style>
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <button class="sidebar-toggle" id="sidebar-toggle">
            <i class="bi bi-list"></i>
        </button>
    </div>
    
    <div class="sidebar-menu">
        <!-- Units -->
        <a href="{% get_dynamic_url 'units:list' %}" class="sidebar-item {% if request.resolver_match.app_name == 'units' %}active{% endif %}">
            <i class="bi bi-gear"></i>
            <span class="sidebar-item-text">Units</span>
        </a>
        
        <!-- Specs -->
        <!-- <a href="{% get_dynamic_url '#' %}" class="sidebar-item {% if request.resolver_match.app_name == 'specs' %}active{% endif %}">
            <i class="bi bi-box"></i>
            <span class="sidebar-item-text">Specs</span>
        </a> -->
        
        <!-- Safety (with submenu) -->
        <div class="sidebar-item" data-submenu="safety-submenu">
            {% include 'components/sidebar.html' %}
            <span class="ms-3 text-muted small">
              {% for activity in component.status.activities_verbal %}
                {% for subactivity in activity|split:"," %}
                  {% if subactivity|trim != "Idle" %}
                    <span class="badge bg-info">{{ subactivity|trim }}</span>
                  {% endif %}
                {% endfor %}
              {% endfor %}
            </span>
          {% endif %}
        </button>
      </h2>
      <div id="collapse-{{ component.name }}" class="accordion-collapse collapse"
           aria-labelledby="heading-{{ component.name }}" data-bs-parent="#unit-components-accordion">
        <div class="accordion-body">
          <!-- ...existing expanded content... -->
        </div>
      </div>
    </div>
  {% endfor %}
</div>
